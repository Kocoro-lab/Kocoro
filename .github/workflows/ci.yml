name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs on the same ref when new commits land, so rapid
# pushes to a PR don't stack parallel test runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # macos-latest matches the project's release.yml and the development
    # target. ShanClaw ships a meaningful set of macOS-only tools
    # (accessibility, ghostty, screenshot, applescript) whose tests
    # invoke platform binaries directly; ubuntu runners lack those
    # binaries and can't run the full suite.
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          # Pin to the exact version in go.mod so CI tracks the project's
          # Go version automatically on every bump. Mirrors release.yml.
          go-version-file: go.mod
          cache: true

      - name: Install libopus (cgo dep for the koe voice package)
        # internal/koe imports gopkg.in/hraban/opus.v2, which is cgo and
        # links system libopus via `#cgo pkg-config: opus opusfile`. The
        # macos-latest runner does not ship opus.pc, so go vet/build/test
        # ./... (which all compile internal/koe) fail without this. malgo
        # bundles miniaudio and needs no system lib. Exporting PKG_CONFIG_PATH
        # to GITHUB_ENV makes it visible to every later step. brew --prefix
        # keeps the path correct on both arm64 and intel runners.
        run: |
          brew install opus opusfile pkg-config
          echo "PKG_CONFIG_PATH=$(brew --prefix)/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Verify modules
        run: go mod verify

      - name: Check go.mod/go.sum are tidy
        # Fails loudly when a PR adds an import without running
        # `go mod tidy`, instead of letting it pass silently and break
        # downstream consumers of the module.
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Cross-compile check (windows, linux)
        # The daemon must keep cross-compiling for the Electron desktop app's
        # release CI, which builds it for windows/amd64 and linux/amd64. This
        # job runs on macOS, so without this guard a PR that reaches for a
        # POSIX-only syscall (syscall.Flock/Kill/Setpgid, os.Symlink, a
        # unix-only import) would pass green and silently break the Windows
        # binary. CGO is off, so no cross toolchain is needed. This also vets
        # the windows-tagged files (_windows.go) the macOS test job never
        # compiles.
        run: |
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build ./...
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go vet ./...
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build ./...

      - name: Test
        # -count=1 disables the test result cache so CI actually runs
        # tests rather than replaying cached success from a prior run.
        # -timeout is per-package; the job-level timeout-minutes above
        # is the real overall ceiling.
        #
        # -skip '^TestGhosttyTool_ListTabs_Empty$' excludes one test
        # that requires Ghostty >= 1.3.0 to be installed on the runner.
        # GitHub's macos-latest images don't include Ghostty, and the
        # test isn't a meaningful smoke signal for the marketplace /
        # daemon work that actually needs CI coverage. Runs locally.
        # Remove this skip if Ghostty is ever added to the runner setup.
        run: go test -count=1 -timeout=5m -skip '^TestGhosttyTool_ListTabs_Empty$' ./...
